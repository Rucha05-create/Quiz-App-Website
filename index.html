<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Start Screen -->
    <div class="start-screen" id="start-screen">
      <h1>Interactive Quiz App</h1>
      <p>Click the button below to begin the quiz</p>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-screen hide" id="quiz-screen">
      <h2 id="question-number">Question 1 of 5</h2>
      <h1 id="question">Question will appear here</h1>

      <div id="options-box" class="options-box">
        <!-- options will come from JS -->
      </div>

      <button id="next-btn">Next</button>
    </div>

    <!-- Result Screen -->
    <div class="result-screen hide" id="result-screen">
      <h1>Quiz Completed 🎉</h1>
      <p id="score-text">Your score: 0/5</p>
      <button id="restart-btn">Restart Quiz</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
